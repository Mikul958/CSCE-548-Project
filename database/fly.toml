# fly.toml app configuration file generated for speedrun-mysql on 2026-02-23T18:52:05-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'speedrun-mysql'
primary_region = 'iad'

[build]

[[mounts]]
  source = "mysql_data"
  destination = "/var/lib/mysql"

[[services]]
  internal_port = 3306
  protocol = 'tcp'
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[services.tcp_checks]]
    grace_period = "30s"
    interval = "15s"
    restart_limit = 0
    timeout = "2s"

[[vm]]
  memory_mb = 1024
  cpu_kind = 'shared'
  cpus = 1
