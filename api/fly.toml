# fly.toml app configuration file generated for speedrun-csce548 on 2026-02-23T17:58:25-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'speedrun-csce548'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  # Add this to wait longer for Spring Boot to wake up
  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20
  
  [[http_service.checks]]
    grace_period = "30s"
    interval = "10s"
    method = "get"
    path = "/health"
    timeout = "2s"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
