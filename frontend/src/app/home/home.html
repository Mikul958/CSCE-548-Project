<div class="home-container">
  <h1 class="home-title">Speedrun Dashboard</h1>

  @if (loading()) {
    <p>Loading database...</p>
  } @else {
    
    <section class="list-section">
      <div class="section-header">
        <h2>Recent Runs</h2>
        <button mat-raised-button color="accent" (click)="openCreateRunPopup()">
          + Submit Run
        </button>
      </div>
      
      <table mat-table [dataSource]="runDataSource" class="mat-elevation-z2">
        <ng-container matColumnDef="game">
          <th mat-header-cell *matHeaderCellDef> Game </th>
          <td mat-cell *matCellDef="let run"> {{run.game.title}} </td>
        </ng-container>

        <ng-container matColumnDef="time">
          <th mat-header-cell *matHeaderCellDef> Time </th>
          <td mat-cell *matCellDef="let run">
            <a [routerLink]="['/run']" [queryParams]="{ id: run.id }"> 
              {{runService.formatTime(run.timeMilliseconds)}} 
            </a>
          </td>
        </ng-container>

        <ng-container matColumnDef="author">
          <th mat-header-cell *matHeaderCellDef> Author </th>
          <td mat-cell *matCellDef="let run"> {{run.author.username}} </td>
        </ng-container>

        <ng-container matColumnDef="setDate">
          <th mat-header-cell *matHeaderCellDef> Date </th>
          <td mat-cell *matCellDef="let run"> {{run.setDate}} </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="['game', 'time', 'author', 'setDate']"></tr>
        <tr mat-row *matRowDef="let row; columns: ['game', 'time', 'author', 'setDate'];"></tr>
      </table>
      <mat-paginator #runPaging [pageSizeOptions]="[5, 10]" showFirstLastButtons></mat-paginator>
    </section>

    <div class="secondary-lists">
      
      <section class="list-section">
        <div class="section-header">
          <h2>Existing Games</h2>
          <button mat-raised-button color="primary" (click)="openCreateGamePopup()">
            + Create Game
          </button>
        </div>
        
        <table mat-table [dataSource]="gameDataSource" class="mat-elevation-z2">
          <ng-container matColumnDef="title">
            <th mat-header-cell *matHeaderCellDef> Title </th>
            <td mat-cell *matCellDef="let game">
              <a [routerLink]="['/game']" [queryParams]="{ id: game.id }"> {{game.title}} </a>
            </td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="['title']"></tr>
          <tr mat-row *matRowDef="let row; columns: ['title'];"></tr>
        </table>
        <mat-paginator #gamePaging [pageSizeOptions]="[5, 10]" showFirstLastButtons></mat-paginator>
      </section>

      <section class="list-section">
        <div class="section-header">
          <h2>Existing Authors</h2>
          <button mat-raised-button color="primary" (click)="openCreateAuthorPopup()">
            + Create Author
          </button>
        </div>

        <table mat-table [dataSource]="authorDataSource" class="mat-elevation-z2">
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef> Name </th>
            <td mat-cell *matCellDef="let author">
              <a [routerLink]="['/author']" [queryParams]="{ id: author.id }"> {{author.displayName}} </a>
            </td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="['name']"></tr>
          <tr mat-row *matRowDef="let row; columns: ['name'];"></tr>
        </table>
        <mat-paginator #authorPaging [pageSizeOptions]="[5, 10]" showFirstLastButtons></mat-paginator>
      </section>

    </div>
  }
</div>
