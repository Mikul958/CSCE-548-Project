<h2 mat-dialog-title>Submit New Run</h2>

<form [formGroup]="runForm" (ngSubmit)="onSubmit()">
  <mat-dialog-content>
    <div class="form-grid">
      <mat-form-field appearance="outline">
        <mat-label>Game</mat-label>
        <input type="text" matInput [matAutocomplete]="autoGame" 
               (input)="gameSearch.set($any($event.target).value)">
        <mat-autocomplete #autoGame [displayWith]="displayGame.bind(this)"
                        (optionSelected)="runForm.patchValue({gameId: $event.option.value})">
          @for (game of filteredGames(); track game.id) {
            <mat-option [value]="game.id">{{game.title}}</mat-option>
          }
        </mat-autocomplete>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Runner (Author)</mat-label>
        <input type="text" matInput [matAutocomplete]="autoAuthor" 
               (input)="authorSearch.set($any($event.target).value)">
        <mat-autocomplete #autoAuthor [displayWith]="displayAuthor.bind(this)"
                        (optionSelected)="runForm.patchValue({authorId: $event.option.value})">
          @for (author of filteredAuthors(); track author.id) {
            <mat-option [value]="author.id">{{author.displayName}}</mat-option>
          }
        </mat-autocomplete>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline">
      <mat-label>Category</mat-label>
      <input matInput formControlName="category" placeholder="Any%, 100%, etc.">
    </mat-form-field>

    <div class="form-grid">
      <mat-form-field appearance="outline">
        <mat-label>Time</mat-label>
        <input matInput formControlName="time" placeholder="HH:MM:SS.mmm">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Date Performed</mat-label>
        <input matInput type="date" formControlName="setDate">
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline">
      <mat-label>Video URL</mat-label>
      <input matInput formControlName="videoUrl" placeholder="YouTube/Twitch link">
    </mat-form-field>

    <mat-checkbox formControlName="verified">Mark as Verified</mat-checkbox>

  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="loading() ? null : onCancel()">Cancel</button>
    <button mat-raised-button color="primary" type="submit" [disabled]="runForm.invalid || loading()">
      {{ loading() ? 'Submitting...' : 'Submit Run' }}
    </button>
  </mat-dialog-actions>
</form>
