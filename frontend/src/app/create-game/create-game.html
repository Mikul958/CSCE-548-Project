<div class="form-container mat-elevation-z3">
  <h2>Add New Game</h2>

  <form [formGroup]="gameForm" (ngSubmit)="onSubmit()">
    
    <mat-form-field appearance="outline">
      <mat-label>Game Title</mat-label>
      <input matInput formControlName="title" placeholder="e.g. Super Mario 64">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Thumbnail URL</mat-label>
      <input matInput formControlName="thumbnailUrl" placeholder="https://image-link.com/boxart.jpg">
    </mat-form-field>

    <div class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>Developer</mat-label>
        <input matInput formControlName="developer">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Publisher</mat-label>
        <input matInput formControlName="publisher">
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline">
      <mat-label>Release Date</mat-label>
      <input matInput type="date" formControlName="releaseDate">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description" rows="4"></textarea>
    </mat-form-field>

    @if (error()) {
      <p class="error-msg">{{ error() }}</p>
    }

    <div class="actions">
      <button mat-button type="button" (click)="onCancel()">Cancel</button>
      <button mat-button type="button" (click)="gameForm.reset()">Clear</button>
      <button mat-raised-button color="primary" type="submit" [disabled]="gameForm.invalid || loading()">
        {{ loading() ? 'Saving...' : 'Create Game' }}
      </button>
    </div>

  </form>
</div>
