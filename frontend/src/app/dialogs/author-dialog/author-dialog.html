<div class="dialog-content">
  <h2 mat-dialog-title>{{ isEditMode() ? 'Edit Author Profile' : 'Register New Author' }}</h2>

  <form [formGroup]="authorForm" (ngSubmit)="onSubmit()">
    <mat-dialog-content>
      <div class="form-grid">
        <mat-form-field appearance="outline">
          <mat-label>Username</mat-label>
          <input matInput formControlName="username" [readonly]="isEditMode()">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Display Name</mat-label>
          <input matInput formControlName="displayName">
        </mat-form-field>
      </div>

      <mat-form-field appearance="outline">
        <mat-label>{{ 'Password' }}</mat-label>
        <input matInput type="password" formControlName="password">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Profile Picture URL</mat-label>
        <input matInput formControlName="profilePictureUrl">
      </mat-form-field>

      @if (error()) {
        <p class="error-msg">{{ error() }}</p>
      }
    </mat-dialog-content>

    <mat-dialog-actions align="end">
      <button mat-button type="button" (click)="onCancel()">Cancel</button>
      <button mat-raised-button color="primary" type="submit" [disabled]="authorForm.invalid || loading()">
        {{ loading() ? 'Saving...' : (isEditMode() ? 'Update Profile' : 'Create Author') }}
      </button>
    </mat-dialog-actions>
  </form>
</div>
